<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Group Chat - Multiple Users</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 1400px;
            height: 900px;
        }

        /* User Windows */
        .user-window {
            flex: 1;
            background: #2d2d3a;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #3d3d4f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .user-header {
            padding: 15px;
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #0f3460;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .user-1 .user-avatar { background: #ff6b6b; }
        .user-2 .user-avatar { background: #4ecdc4; }
        .user-3 .user-avatar { background: #ffd93d; color: #333; }

        .user-info h3 {
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .user-status {
            font-size: 0.7rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        /* Chat Area */
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #2d2d3a;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Message Styles */
        .message {
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 15px;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            background: #4a6fa5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            background: #40404f;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.7rem;
        }

        .message.sent .message-header {
            color: rgba(255,255,255,0.8);
        }

        .message.received .message-header {
            color: #a0a0b0;
        }

        .sender-name {
            font-weight: 600;
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: #1a1a2e;
            border-top: 1px solid #3d3d4f;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .user-input {
            flex: 1;
            padding: 10px 15px;
            background: #2d2d3a;
            border: 1px solid #4a4a5a;
            border-radius: 20px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .user-input:focus {
            border-color: #4a6fa5;
        }

        .user-input::placeholder {
            color: #6b6b7b;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: #4a6fa5;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .send-btn:hover {
            background: #5f7fb5;
            transform: scale(1.1);
        }

        .typing-indicator {
            font-size: 0.7rem;
            color: #a0a0b0;
            margin: 5px 0 0 15px;
            font-style: italic;
            min-height: 20px;
        }

        .user-count {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .badge {
            background: #1a1a2e;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid #3d3d4f;
        }

        .clear-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 10px;
        }

        .clear-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- User 1 Window (Alice) -->
        <div class="user-window user-1" id="user1-window">
            <div class="user-header">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <h3>Alice (You)</h3>
                    <div class="user-status">
                        <span class="status-dot"></span>
                        Online
                    </div>
                </div>
            </div>
            
            <div class="chat-messages" id="user1-messages"></div>
            
            <div class="input-area">
                <div class="typing-indicator" id="user1-typing"></div>
                <div class="input-group">
                    <input type="text" class="user-input" id="user1-input" placeholder="Type as Alice...">
                    <button class="send-btn" onclick="sendMessage(1)">→</button>
                </div>
            </div>
        </div>

        <!-- User 2 Window (Bob) -->
        <div class="user-window user-2" id="user2-window">
            <div class="user-header">
                <div class="user-avatar">B</div>
                <div class="user-info">
                    <h3>Bob (You)</h3>
                    <div class="user-status">
                        <span class="status-dot"></span>
                        Online
                    </div>
                </div>
            </div>
            
            <div class="chat-messages" id="user2-messages"></div>
            
            <div class="input-area">
                <div class="typing-indicator" id="user2-typing"></div>
                <div class="input-group">
                    <input type="text" class="user-input" id="user2-input" placeholder="Type as Bob...">
                    <button class="send-btn" onclick="sendMessage(2)">→</button>
                </div>
            </div>
        </div>

        <!-- User 3 Window (Charlie) -->
        <div class="user-window user-3" id="user3-window">
            <div class="user-header">
                <div class="user-avatar">C</div>
                <div class="user-info">
                    <h3>Charlie (You)</h3>
                    <div class="user-status">
                        <span class="status-dot"></span>
                        Online
                    </div>
                </div>
            </div>
            
            <div class="chat-messages" id="user3-messages"></div>
            
            <div class="input-area">
                <div class="typing-indicator" id="user3-typing"></div>
                <div class="input-group">
                    <input type="text" class="user-input" id="user3-input" placeholder="Type as Charlie...">
                    <button class="send-btn" onclick="sendMessage(3)">→</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // User definitions
        const users = {
            1: { name: 'Alice', color: '#ff6b6b' },
            2: { name: 'Bob', color: '#4ecdc4' },
            3: { name: 'Charlie', color: '#ffd93d' }
        };

        // Message history (shared across all users)
        let messages = [
            { id: 1, userId: 1, text: "Hey everyone! Welcome to the private group chat!", timestamp: Date.now() - 60000 },
            { id: 2, userId: 2, text: "Thanks Alice! Glad to be here.", timestamp: Date.now() - 45000 },
            { id: 3, userId: 3, text: "Hi all! This is great - we can all chat together!", timestamp: Date.now() - 30000 }
        ];

        // Typing states
        let typingUsers = {
            1: false,
            2: false,
            3: false
        };

        // Typing timeouts
        let typingTimeouts = {
            1: null,
            2: null,
            3: null
        };

        // Get current time
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Format timestamp
        function formatTimestamp(timestamp) {
            const diff = Date.now() - timestamp;
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Update all users' chat windows
        function updateAllChats() {
            for (let userId = 1; userId <= 3; userId++) {
                updateUserChat(userId);
            }
        }

        // Update specific user's chat window
        function updateUserChat(currentUserId) {
            const messagesDiv = document.getElementById(`user${currentUserId}-messages`);
            if (!messagesDiv) return;

            // Sort messages by timestamp
            const sortedMessages = [...messages].sort((a, b) => a.timestamp - b.timestamp);
            
            let html = '';
            sortedMessages.forEach(msg => {
                const isOwnMessage = msg.userId === currentUserId;
                const senderName = users[msg.userId].name;
                
                html += `
                    <div class="message ${isOwnMessage ? 'sent' : 'received'}">
                        <div class="message-header">
                            <span class="sender-name">${isOwnMessage ? 'You' : senderName}</span>
                            <span class="timestamp">${formatTimestamp(msg.timestamp)}</span>
                        </div>
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                    </div>
                `;
            });
            
            messagesDiv.innerHTML = html;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Send message from specific user
        function sendMessage(userId) {
            const input = document.getElementById(`user${userId}-input`);
            const text = input.value.trim();
            
            if (text === '') {
                alert('Please type a message!');
                return;
            }

            // Add message to shared history
            const newMessage = {
                id: messages.length + 1,
                userId: userId,
                text: text,
                timestamp: Date.now()
            };
            
            messages.push(newMessage);
            
            // Clear input
            input.value = '';
            
            // Update all chat windows
            updateAllChats();
            
            // Clear typing indicator for this user
            clearTypingIndicator(userId);
        }

        // Handle typing indicator
        function handleTyping(userId) {
            // Set typing state
            typingUsers[userId] = true;
            updateTypingIndicators();
            
            // Clear previous timeout
            if (typingTimeouts[userId]) {
                clearTimeout(typingTimeouts[userId]);
            }
            
            // Set new timeout to clear typing indicator after 2 seconds
            typingTimeouts[userId] = setTimeout(() => {
                typingUsers[userId] = false;
                updateTypingIndicators();
            }, 2000);
        }

        // Update typing indicators for all users
        function updateTypingIndicators() {
            for (let viewerId = 1; viewerId <= 3; viewerId++) {
                const typingDiv = document.getElementById(`user${viewerId}-typing`);
                if (!typingDiv) continue;
                
                // Get list of users typing (excluding the viewer)
                const typingList = [];
                for (let userId = 1; userId <= 3; userId++) {
                    if (typingUsers[userId] && userId !== viewerId) {
                        typingList.push(users[userId].name);
                    }
                }
                
                // Update typing indicator text
                if (typingList.length === 0) {
                    typingDiv.textContent = '';
                } else if (typingList.length === 1) {
                    typingDiv.textContent = `${typingList[0]} is typing...`;
                } else if (typingList.length === 2) {
                    typingDiv.textContent = `${typingList[0]} and ${typingList[1]} are typing...`;
                } else {
                    typingDiv.textContent = 'Multiple people are typing...';
                }
            }
        }

        // Clear typing indicator for a user
        function clearTypingIndicator(userId) {
            typingUsers[userId] = false;
            if (typingTimeouts[userId]) {
                clearTimeout(typingTimeouts[userId]);
                typingTimeouts[userId] = null;
            }
            updateTypingIndicators();
        }

        // Set up event listeners for all users
        function setupEventListeners() {
            for (let userId = 1; userId <= 3; userId++) {
                const input = document.getElementById(`user${userId}-input`);
                
                // Handle typing
                input.addEventListener('input', () => {
                    handleTyping(userId);
                });
                
                // Handle Enter key
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        sendMessage(userId);
                    }
                });
                
                // Handle focus/blur for typing indicator
                input.addEventListener('blur', () => {
                    clearTypingIndicator(userId);
                });
            }
        }

        // Initialize chat
        function initChat() {
            updateAllChats();
            setupEventListeners();
            
            // Add welcome message from system
            setTimeout(() => {
                const systemMessage = {
                    id: messages.length + 1,
                    userId: 0, // System user
                    text: 'All users are now connected. Start chatting!',
                    timestamp: Date.now()
                };
                messages.push(systemMessage);
                updateAllChats();
            }, 1000);
        }

        // Start the chat
        initChat();
    </script>
</body>
</html>
